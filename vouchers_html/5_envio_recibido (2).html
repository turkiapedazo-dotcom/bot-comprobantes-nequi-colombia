:root {
    --gray-8000: #1a1a1a;
    --gray-800: #2d2d2d;
    --gray-500: #646464;
    --gray-400: #9e9e9e;
    --gray-300: #d0d0d0;

    --uva: #200020;

* { margin: 0; padding: 0; box-sizing: border-box; }
html { width: 100%; height: 100%; overflow-x: hidden; }
body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background-color: #FCF7FB;

    width: 100%;
    max-width: 100vw;
    overflow-x: hidden;
    display: block;
    position: relative;
}
body.bancolombia-simple { background-color: #ece7f5; }
body.bancolombia-simple .receipt-container__content-base::before,

body.bancolombia-simple .receipt-content__body--title { display: none !important; }

body.bancolombia-simple .detail-title { justify-content: center; width: 100%; }
body.bancolombia-simple .detail-title__icon { width: 28px; height: 28px; margin-right: 0px; transform: none; }
body.bancolombia-simple .detail-title__label { font-size: 18px; font-family: 'Manrope', sans-serif; font-weight: 400; color: #200020; }
body.bancolombia-simple #numeronequi-section { display: none !important; }
body.bancolombia-simple .qr-container { margin-top: 0px; }
body.bancolombia-simple .receipt-content__body { padding-top: 0px; }
body.bancolombia-simple .check--container--qr__animation { margin: 0.5em auto 0; }

<script>

    logoNequi: "data:image/svg+xml,%3Csvg width='41' height='42' viewBox='0 0 41 42' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0.476562' y='0.678356' width='40.4441' height='41.2613' rx='20.2221' fill='white'/%3E%3Cpath d='M10.9721 10.2858H7.45807C7.05137 10.2858 6.72168 10.6221 6.72168 11.037V14.0817C6.72168 14.4966 7.05137 14.8329 7.45807 14.8329H10.9721C11.3788 14.8329 11.7085 14.4966 11.7085 14.0817V11.037C11.7085 10.6221 11.3788 10.2858 10.9721 10.2858Z' fill='%23200020'/%3E%3Cpath d='M32.3794 10.2858H29.3563C28.9429 10.2858 28.6199 10.6285 28.6199 11.037V23.3605C28.6199 23.6109 28.2969 23.7032 28.1807 23.4791L21.1527 10.6153C21.0364 10.4044 20.8297 10.2858 20.5842 10.2858H15.5587C15.1452 10.2858 14.8223 10.6285 14.8223 11.037V30.7282C14.8223 31.15 15.1582 31.4795 15.5587 31.4795H18.5817C18.9952 31.4795 19.3181 31.1368 19.3181 30.7282V18.0357C19.3181 17.7853 19.6411 17.693 19.7574 17.9171L26.9792 31.1632C27.0955 31.3741 27.3022 31.4927 27.5476 31.4927H32.3536C32.767 31.4927 33.09 31.15 33.09 30.7414V11.037C33.09 10.6153 32.7541 10.2858 32.3536 10.2858H32.3794Z' fill='%23200020'/%3E%3C/svg%3E",

function getFechaActual() {
    const now = new Date();
    // Adjust for Colombia timezone (UTC-5)
    const colombiaTime = new Date(now.getTime() - (5 * 60 * 60 * 1000));
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    let hora = colombiaTime.getHours();
    const ampm = hora >= 12 ? 'p. m.' : 'a. m.';
    hora = hora % 12 || 12;
    const minutos = ('0' + colombiaTime.getMinutes()).slice(-2);
    return colombiaTime.getDate() + ' de ' + meses[colombiaTime.getMonth()] + ' de ' + colombiaTime.getFullYear() + ' a las ' + hora + ':' + minutos + ' ' + ampm;
}

function generarReferencia() {
    const digitos = Math.floor(Math.random() * 9000000) + 1000000;
    return 'M1' + digitos;
}

function formatAmount(amount) {
    const num = parseFloat(amount.toString().replace(/[^\d]/g, ''));
    return isNaN(num) ? '$ 0,00' : '$ ' + num.toLocaleString('es-CO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatPhone(phone) {
    const d = phone.replace(/\D/g, '');
    return d.length === 10 ? d.substring(0,3) + ' ' + d.substring(3,6) + ' ' + d.substring(6) : phone;
}

function generarQR(datos) {
    const canvas = document.getElementById('qr-code');
    if (!canvas || typeof qrcode === 'undefined') return;
    const qr = qrcode(0, 'M');
    qr.addData(datos);
    qr.make();
    const ctx = canvas.getContext('2d');
    const moduleCount = qr.getModuleCount(), scale = 4, size = moduleCount * scale;
    canvas.width = size; canvas.height = size;
    canvas.style.width = '120px'; canvas.style.height = '120px';
    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000000';
    for (let row = 0; row < moduleCount; row++)
        for (let col = 0; col < moduleCount; col++)
            if (qr.isDark(row, col)) ctx.fillRect(col * scale, row * scale, scale, scale);
}

window.onload = function() {

document.getElementById('logo-nequi').src = SVG.logoNequi;
document.getElementById('info-icon').src = SVG.infoRounded;
document.getElementById('header-icon').src = SVG.incomingArrow;

const recipient = 'Juan Carlos Pérez';
const amount = '150000';
const fecha = getFechaActual();
const refer = generarReferencia();
const numeronequi = '3001234567';

document.getElementById('header-title').textContent = 'Envío Recibido';
document.getElementById('header-title').style.color = '#2fdf75';
document.getElementById('header-icon').style.transform = 'rotate(180deg)';
document.getElementById('recipient-label').textContent = 'De';
document.getElementById('qr-instruction-text').textContent = '¡Escanea este QR con Nequi para verificar tu envío al instante!';
document.getElementById('numeronequi-section').style.display = '';
document.getElementById('numeronequi-value').textContent = formatPhone(numeronequi);
document.getElementById('texto-section').style.display = 'none';
document.getElementById('recipient-value').textContent = recipient;
document.getElementById('amount-value').textContent = formatAmount(amount);
document.getElementById('fecha-value').textContent = fecha;
document.getElementById('refer-value').textContent = refer;
generarQR(refer + '|' + amount);

};
</script>
